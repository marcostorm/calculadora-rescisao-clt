<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Rescisão CLT</title>
<style>
  :root { --primary: #8A05BE; --text: #1a1a1a; --muted: #6B6B6B; --bg: #fafafa; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 24px; line-height: 1.6; }
  main { max-width: 720px; margin: 40px auto; background: #fff; padding: 48px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.05); text-align: center; }
  h1 { color: var(--primary); font-size: 36px; margin: 0 0 12px; }
  .tag { color: var(--muted); font-size: 16px; margin-bottom: 32px; }
  p { color: var(--text); }
  .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 32px; }
  .links a { color: var(--primary); text-decoration: none; padding: 12px 24px; border: 2px solid var(--primary); border-radius: 8px; font-weight: 600; transition: all 0.2s; }
  .links a:hover { background: var(--primary); color: #fff; }
</style>
</head>
<body>
<main>
  <h1>Calculadora de Rescisão CLT</h1>
  <p class="tag">App Android para calcular sua rescisão trabalhista — gratuito, sem cadastro.</p>
  <p>Calcule rapidamente saldo de salário, 13º proporcional, férias proporcionais + 1/3, FGTS e multa de 40%, direto no seu celular.</p>
  <div class="links">
    <a href="privacidade.html">Política de privacidade</a>
    <a href="https://github.com/marcostorm/calculadora-rescisao-clt" target="_blank">GitHub</a>
  </div>
</main>
</body>
</html>
